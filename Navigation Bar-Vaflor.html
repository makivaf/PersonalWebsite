<!DOCTYPE html>
<html lang='en' dir="ltr">
    <head>
        <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Quiz- Navigation Bar</title>
    <style>
        *{
    padding:0;
    margin:0;
    text-decoration: none;
    box-sizing: border-box;
   }
   
   nav{
       overflow: hidden;
       background: pink;
       position: fixed;
       top: 0;
       width: 100%;
   }
   
   label.logo{
       color: black;
       font-size: 40px;
       line-height: 80px;
       padding: 0 60px;
       font-weight: bold;
   }
   nav ul{
       float:right;
       margin-right: 25px;
   }
   nav ul li{
       display: inline-block;
       line-height: 80px;
       margin: 0 5px;
   }
   nav ul li a{
       color: white;
       font-size: 20px;
       font-weight: bold;
       padding: 7px 15px;
       border-radius: 3px;
   }
   .background-image{
       background-image: url("https://i.pinimg.com/564x/dd/52/c5/dd52c5fe197c612b667fcb1cc7080877.jpg");
       background-size: cover;
       background-repeat: no-repeat;
       height: 130vh;
   }
   nav ul li a:hover 
   {
     color: pink;
     background: black;
   }
   
    </style>
</head>
<nav class="navbar">
    <label class="logo">BLACKPINK</label>
<ul>
    <li><a href="#">Home</a></li>
    <li><a href="#">About</a></li>
    <li><a href="#">Members</a></li>
    <li><a href="#">Songs</a></li>
    <li><a href="#">Awards</a></li>
</ul>
</nav>
<div class="background-image"></div>
</body>
<footer><img src="https://blackpinkupdate.com/wp-content/uploads/2020/06/BLACKPINK-Logo-Pink-PNG.jpg" height="300px" width="1350"></footer>
</html>
